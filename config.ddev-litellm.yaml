#ddev-generated
# ddev-litellm: auto-configures ai_provider_litellm module on each ddev start
hooks:
  post-start:
    - exec: "if drush pm:list --status=enabled --field=name 2>/dev/null | grep -q 'ai_provider_litellm'; then drush config:set ai_provider_litellm.settings host \"http://ddev-${DDEV_SITENAME}-litellm:4000\" -y && echo 'ddev-litellm: Drupal ai_provider_litellm host configured.'; fi"
